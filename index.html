<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Kuşlar ve Orijinal Galaksi</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="theme-pink">
    
    <div id="magic-trigger">
      <span class="magic-star">✦</span>
    </div>

    <div id="back-trigger" style="display: none;">
      <span class="back-arrow">&#10094;</span>
    </div>

    <div id="scene-pink">
      <div id="root"></div>
      <canvas id="canvas-birds"></canvas>
    </div>

    <div id="scene-galaxy" style="display: none;">
      <canvas id="canvas-galaxy"></canvas>
      <div id="star-counter">Calculating Stars...</div>
    </div>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/react/16.12.0/umd/react.production.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/react-dom/16.12.0/umd/react-dom.production.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/animejs/3.1.0/anime.min.js'></script>
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.6.3/dist/es-module-shims.js" crossorigin="anonymous"></script>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./script.js"></script>
  </body>
</html>
